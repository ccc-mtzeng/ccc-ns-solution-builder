<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NS Solution Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body,#root{height:100%;width:100%;overflow:hidden}
    body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F1117}
    textarea,input,select,button{font-family:inherit}
    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#0F1117;color:#5B8DEF;font-family:'JetBrains Mono',monospace;gap:12px}
    #loading .spinner{width:24px;height:24px;border:2px solid #2A2E3B;border-top-color:#5B8DEF;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"><div id="loading"><div class="spinner"></div><span style="font-size:13px">Loading NS Solution Builder...</span></div></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<script type="text/babel" data-presets="react">
  const { useState, useCallback, useRef, useEffect } = React;
  
  const SCRIPT_TYPES = {
    "Client Script": {
      prefix: "CS",
      entryPoints: [
        { name: "pageInit", description: "Fires when the page completes loading or when a form is reset", pseudo: "" },
        { name: "fieldChanged", description: "Fires after a field value is changed", pseudo: "" },
        { name: "postSourcing", description: "Fires after all sourcing is complete for a field", pseudo: "" },
        { name: "lineInit", description: "Fires when inserting a new line or selecting an existing line", pseudo: "" },
        { name: "validateField", description: "Fires before a field value change is committed", pseudo: "" },
        { name: "validateLine", description: "Fires before a line is added to a sublist", pseudo: "" },
        { name: "validateInsert", description: "Fires before a new line is inserted in a sublist", pseudo: "" },
        { name: "validateDelete", description: "Fires before a line is removed from a sublist", pseudo: "" },
        { name: "saveRecord", description: "Fires when the record is saved", pseudo: "" },
        { name: "sublistChanged", description: "Fires after a sublist commit", pseudo: "" },
      ],
    },
    "User Event": {
      prefix: "UE",
      entryPoints: [
        { name: "beforeLoad", description: "Fires before the record form is loaded", pseudo: "" },
        { name: "beforeSubmit", description: "Fires before the record is submitted to the database", pseudo: "" },
        { name: "afterSubmit", description: "Fires after the record is submitted to the database", pseudo: "" },
      ],
    },
    "Map/Reduce": {
      prefix: "MR",
      entryPoints: [
        { name: "getInputData", description: "Defines the input data for processing", pseudo: "" },
        { name: "map", description: "Processes each key-value pair from getInputData", pseudo: "" },
        { name: "reduce", description: "Processes each group of values by key", pseudo: "" },
        { name: "summarize", description: "Summarizes the results of map and reduce stages", pseudo: "" },
      ],
    },
    "Scheduled Script": {
      prefix: "SS",
      entryPoints: [
        { name: "execute", description: "Main execution point, runs on schedule or on demand", pseudo: "" },
      ],
    },
    Suitelet: {
      prefix: "SL",
      entryPoints: [
        { name: "onRequest", description: "Handles GET and POST requests to the Suitelet URL", pseudo: "" },
      ],
    },
    Restlet: {
      prefix: "RL",
      entryPoints: [
        { name: "get", description: "Handles HTTP GET requests", pseudo: "" },
        { name: "post", description: "Handles HTTP POST requests", pseudo: "" },
        { name: "put", description: "Handles HTTP PUT requests", pseudo: "" },
        { name: "delete", description: "Handles HTTP DELETE requests", pseudo: "" },
      ],
    },
    "Workflow Action Script": {
      prefix: "WA",
      entryPoints: [
        { name: "onAction", description: "Fires when the workflow action is triggered", pseudo: "" },
      ],
    },
    "Mass Update Script": {
      prefix: "MU",
      entryPoints: [
        { name: "each", description: "Processes each record matching the mass update criteria", pseudo: "" },
      ],
    },
  };
  
  const FIELD_TYPES = [
    "Free-Form Text","Text Area","Long Text","Rich Text","Email","Phone",
    "Integer","Decimal","Currency","Percent","Checkbox",
    "Date","Date/Time","Time of Day","List/Record","Multiple Select","Inline HTML",
  ];
  
  const EST_DEFAULT = [
    { task: "Requirement Gathering/Scoping", min: "", max: "" },
    { task: "Testing", min: "", max: "" },
    { task: "Training", min: "", max: "" },
  ];
  
  function mkTask(index) {
    return {
      id: Date.now() + index,
      name: "Task " + (index + 1),
      context: "",
      requirements: [{ ref: "REQ-01", type: "user", details: "" }],
      assumptions: [{ ref: "ASM-01", details: "" }],
      solutionOverview: "",
      diagrams: "",
      dataStructures: [{ id: Date.now(), recordName: "", type: "standard", customRecordId: "", headerFields: [{ name: "", id: "_ccc_", fieldType: "", notes: "" }], lineFields: [] }],
      scripts: [],
    };
  }
  
  function mkScript(type) {
    const t = SCRIPT_TYPES[type];
    return { id: Date.now() + Math.random(), type, name: "CCC | [Description] " + t.prefix, deployOn: "", triggers: "", entryPoints: t.entryPoints.map((ep) => ({ ...ep })) };
  }
  
  function mkSolution() {
    return {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      savedAt: new Date().toISOString(),
      project: { title: "", customer: "", version: "1.0", date: new Date().toLocaleDateString(), deployment: "" },
      tasks: [mkTask(0)],
      estimates: [...EST_DEFAULT],
    };
  }
  
  // ─── Theme ───
  const K = {
    bg:"#0F1117",sfc:"#181B25",sfcH:"#1E2230",
    bdr:"#2A2E3B",bdrF:"#5B8DEF",
    acc:"#5B8DEF",accBg:"rgba(91,141,239,0.08)",
    txt:"#E4E7EE",dim:"#8B90A0",mut:"#5A5F72",
    ok:"#4ADE80",warn:"#FBBF24",err:"#EF4444",
    errBg:"rgba(239,68,68,0.08)",code:"#1A1D27",ora:"#F59E0B",
  };
  const mono = "'JetBrains Mono','SF Mono','Cascadia Code','Fira Code',monospace";
  const sans = "'DM Sans','Inter',-apple-system,sans-serif";
  
  // ─── Primitives ───
  
  function TI({ label, value, onChange, placeholder, isMono, multi, rows }) {
    const El = multi ? "textarea" : "input";
    return (
      <div style={{ marginBottom: 14 }}>
        {label && <label style={{ display:"block",fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5,fontFamily:sans }}>{label}</label>}
        <El value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows||3}
            style={{ width:"100%",padding:multi?"10px 12px":"8px 12px",background:K.code,border:"1px solid "+K.bdr,borderRadius:6,color:K.txt,fontSize:13,fontFamily:isMono?mono:sans,outline:"none",resize:multi?"vertical":"none",lineHeight:1.6,transition:"border-color 0.15s" }}
            onFocus={e=>{e.target.style.borderColor=K.bdrF}} onBlur={e=>{e.target.style.borderColor=K.bdr}} />
      </div>
    );
  }
  
  function Sel({ label, value, onChange, options, placeholder }) {
    return (
      <div style={{ marginBottom:14 }}>
        {label && <label style={{ display:"block",fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5,fontFamily:sans }}>{label}</label>}
        <select value={value} onChange={e=>onChange(e.target.value)} style={{ width:"100%",padding:"8px 12px",background:K.code,border:"1px solid "+K.bdr,borderRadius:6,color:value?K.txt:K.mut,fontSize:13,fontFamily:sans,outline:"none",cursor:"pointer" }}>
          {placeholder && <option value="">{placeholder}</option>}
          {options.map(o=><option key={o} value={o}>{o}</option>)}
        </select>
      </div>
    );
  }
  
  function Btn({ children, onClick, v="default", sm, style:sx, disabled:d }) {
    const base = { padding:sm?"5px 10px":"8px 16px",borderRadius:6,fontSize:sm?11:12,fontWeight:600,fontFamily:sans,cursor:d?"not-allowed":"pointer",border:"none",transition:"all 0.15s",display:"inline-flex",alignItems:"center",gap:6,opacity:d?0.5:1,letterSpacing:"0.02em" };
    const vs = { default:{background:K.sfcH,color:K.txt}, primary:{background:K.acc,color:"#fff"}, danger:{background:K.errBg,color:K.err,border:"1px solid "+K.err+"33"}, ghost:{background:"transparent",color:K.dim}, success:{background:"rgba(74,222,128,0.1)",color:K.ok,border:"1px solid "+K.ok+"33"} };
    return <button onClick={d?undefined:onClick} style={{ ...base,...vs[v],...sx }}>{children}</button>;
  }
  
  function Sec({ title, children, actions }) {
    return (
      <div style={{ marginBottom:24 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
          <h3 style={{ fontSize:13,fontWeight:700,color:K.acc,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:sans,margin:0 }}>{title}</h3>
          {actions}
        </div>
        {children}
      </div>
    );
  }
  
  function Tabs({ tabs, active, onChange }) {
    return (
      <div style={{ display:"flex",gap:2,marginBottom:20,borderBottom:"1px solid "+K.bdr }}>
        {tabs.map(t=>(
          <button key={t.key} onClick={()=>onChange(t.key)}
                  style={{ padding:"8px 16px",fontSize:12,fontWeight:active===t.key?700:500,fontFamily:sans,color:active===t.key?K.acc:K.dim,background:"transparent",border:"none",borderBottom:active===t.key?"2px solid "+K.acc:"2px solid transparent",cursor:"pointer",transition:"all 0.15s",marginBottom:-1 }}>
            {t.label}
          </button>
        ))}
      </div>
    );
  }
  
  // ─── Script Builder ───
  function ScriptBuilder({ script, onUpdate, onRemove }) {
    const [exp, setExp] = useState({});
    const toggle = n => setExp(p=>({...p,[n]:!p[n]}));
    const upEp = (i, f, v) => { const eps=[...script.entryPoints]; eps[i]={...eps[i],[f]:v}; onUpdate({...script,entryPoints:eps}); };
    return (
      <div style={{ background:K.code,border:"1px solid "+K.bdr,borderRadius:8,padding:16,marginBottom:12 }}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12 }}>
          <div style={{ display:"flex",alignItems:"center",gap:8 }}>
            <span style={{ padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:K.accBg,color:K.acc,fontFamily:mono,letterSpacing:"0.05em" }}>{(SCRIPT_TYPES[script.type]||{}).prefix||"??"}</span>
            <span style={{ fontSize:13,fontWeight:600,color:K.txt,fontFamily:sans }}>{script.type}</span>
          </div>
          <Btn sm v="danger" onClick={onRemove}>✕</Btn>
        </div>
        <TI label="Script Name" value={script.name} onChange={v=>onUpdate({...script,name:v})} placeholder="CCC | Description UE" isMono />
        <TI label="Deployed On" value={script.deployOn} onChange={v=>onUpdate({...script,deployOn:v})} placeholder="e.g., Sales Order, Invoice" />
        <TI label="Trigger Conditions" value={script.triggers} onChange={v=>onUpdate({...script,triggers:v})} placeholder="e.g., BeforeSubmit Create/Edit" />
        <div style={{ marginTop:12 }}>
          <label style={{ display:"block",fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,fontFamily:sans }}>Entry Points</label>
          {script.entryPoints.map((ep,i)=>(
            <div key={ep.name} style={{ marginBottom:4 }}>
              <button onClick={()=>toggle(ep.name)} style={{ width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:exp[ep.name]?K.sfcH:"transparent",border:"1px solid "+(exp[ep.name]?K.bdr:"transparent"),borderRadius:6,cursor:"pointer",color:ep.pseudo?K.ok:K.dim,fontFamily:mono,fontSize:12,transition:"all 0.15s" }}>
                <span><span style={{ color:K.ora,marginRight:4 }}>ƒ</span> {ep.name}{ep.pseudo && <span style={{ marginLeft:8,fontSize:10,color:K.ok }}>● has pseudo-code</span>}</span>
                <span style={{ fontSize:10,transform:exp[ep.name]?"rotate(180deg)":"rotate(0)",transition:"transform 0.15s" }}>▼</span>
              </button>
              {exp[ep.name] && (
                <div style={{ padding:"8px 12px 12px",borderLeft:"2px solid "+K.bdr,marginLeft:16,marginTop:4 }}>
                  <p style={{ fontSize:11,color:K.mut,fontFamily:sans,margin:"0 0 8px",lineHeight:1.5 }}>{ep.description}</p>
                  <textarea value={ep.pseudo} onChange={e=>upEp(i,"pseudo",e.target.value)} placeholder={"// Describe the logic...\n// e.g., Loop over line items\n//   Get item price"} rows={6}
                            style={{ width:"100%",padding:"10px 12px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:6,color:K.txt,fontSize:12,fontFamily:mono,outline:"none",resize:"vertical",lineHeight:1.7 }} />
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    );
  }
  
  // ─── Data Structure Builder ───
  function DSBuilder({ ds, onUpdate, onRemove }) {
    const addF = s => { const d={...ds}; d[s]=[...d[s],{name:"",id:"_ccc_",fieldType:"",notes:""}]; onUpdate(d); };
    const upF = (s,i,f,v) => { const d={...ds}; d[s]=d[s].map((x,j)=>j===i?{...x,[f]:v}:x); onUpdate(d); };
    const rmF = (s,i) => { const d={...ds}; d[s]=d[s].filter((_,j)=>j!==i); onUpdate(d); };
    const FT = ({ fields, section }) => (
      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:sans }}>
          <thead><tr>{["Field Name","ID","Type","Notes",""].map(h=><th key={h} style={{ padding:"6px 8px",textAlign:"left",fontSize:10,fontWeight:700,color:K.mut,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid "+K.bdr }}>{h}</th>)}</tr></thead>
          <tbody>{fields.map((f,i)=>(
            <tr key={i}>
              <td style={{ padding:"4px" }}><input value={f.name} onChange={e=>upF(section,i,"name",e.target.value)} placeholder="Field name" style={{ width:"100%",padding:"5px 8px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:4,color:K.txt,fontSize:12,fontFamily:sans,outline:"none" }} /></td>
              <td style={{ padding:"4px" }}><input value={f.id} onChange={e=>upF(section,i,"id",e.target.value)} placeholder="_ccc_" style={{ width:"100%",padding:"5px 8px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:4,color:K.txt,fontSize:12,fontFamily:mono,outline:"none" }} /></td>
              <td style={{ padding:"4px" }}>
                <select value={f.fieldType} onChange={e=>upF(section,i,"fieldType",e.target.value)} style={{ width:"100%",padding:"5px 8px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:4,color:f.fieldType?K.txt:K.mut,fontSize:12,fontFamily:sans,outline:"none" }}>
                  <option value="">Select type</option>{FIELD_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </td>
              <td style={{ padding:"4px" }}><input value={f.notes} onChange={e=>upF(section,i,"notes",e.target.value)} placeholder="Notes" style={{ width:"100%",padding:"5px 8px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:4,color:K.txt,fontSize:12,fontFamily:sans,outline:"none" }} /></td>
              <td style={{ padding:"4px",width:30 }}><Btn sm v="ghost" onClick={()=>rmF(section,i)} style={{ color:K.err,padding:"2px 6px" }}>✕</Btn></td>
            </tr>
          ))}</tbody>
        </table>
        <Btn sm onClick={()=>addF(section)} style={{ marginTop:6 }}>+ Add Field</Btn>
      </div>
    );
    return (
      <div style={{ background:K.code,border:"1px solid "+K.bdr,borderRadius:8,padding:16,marginBottom:12 }}>
        <div style={{ display:"flex",justifyContent:"space-between",marginBottom:12 }}>
          <div style={{ flex:1 }}><Sel label="Record Type" value={ds.type} onChange={v=>onUpdate({...ds,type:v})} options={["standard","custom"]} /></div>
          <Btn sm v="danger" onClick={onRemove} style={{ marginTop:20 }}>✕</Btn>
        </div>
        <TI label={ds.type==="custom"?"Custom Record Name":"Record Name"} value={ds.recordName} onChange={v=>onUpdate({...ds,recordName:v})} placeholder="e.g., Sales Order" />
        {ds.type==="custom" && <TI label="Custom Record ID" value={ds.customRecordId} onChange={v=>onUpdate({...ds,customRecordId:v})} placeholder="_ccc_record_id" isMono />}
        <div style={{ marginTop:8 }}><label style={{ fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:sans }}>Header Fields</label><FT fields={ds.headerFields} section="headerFields" /></div>
        <div style={{ marginTop:12 }}>
          <div style={{ display:"flex",alignItems:"center",gap:8 }}>
            <label style={{ fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:sans }}>Line Fields</label>
            {ds.lineFields.length===0 && <Btn sm onClick={()=>addF("lineFields")}>+ Add Line Fields</Btn>}
          </div>
          {ds.lineFields.length>0 && <FT fields={ds.lineFields} section="lineFields" />}
        </div>
      </div>
    );
  }
  
  // ─── AI Suggestions ───
  function AISug({ context, requirements, onApply }) {
    const [loading, setLoading] = useState(false);
    const [sug, setSug] = useState(null);
    const [err, setErr] = useState(null);
    const go = async () => {
      if(!context && requirements.every(r=>!r.details)){setErr("Enter context or requirements first.");return;}
      setLoading(true);setErr(null);setSug(null);
      const rTxt = requirements.filter(r=>r.details).map(r=>r.ref+": "+r.details).join("\n");
      const prompt = `You are a NetSuite technical consultant. Based on the following context and requirements, suggest the most appropriate NetSuite customization approach.\n\nContext: ${context||"Not provided"}\n\nRequirements:\n${rTxt||"Not provided"}\n\nRespond ONLY with valid JSON (no markdown, no backticks). Use this exact structure:\n{"summary":"2-3 sentence overview","suggestedScripts":[{"type":"One of: Client Script, User Event, Map/Reduce, Scheduled Script, Suitelet, Restlet, Workflow Action Script, Mass Update Script","name":"CCC naming convention","deployOn":"record","triggers":"when","reasoning":"why"}],"suggestedFields":[{"recordName":"record","fieldName":"name","fieldId":"_ccc_id","fieldType":"type","purpose":"why"}],"assumptions":["assumptions"],"considerations":["things to consider"]}`;
      try {
        const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
        const data = await res.json();
        const txt = (data.content||[]).map(x=>x.text||"").join("")||"";
        setSug(JSON.parse(txt.replace(/```json|```/g,"").trim()));
      } catch { setErr("Failed. Please try again."); }
      setLoading(false);
    };
    return (
      <div style={{ background:"linear-gradient(135deg,"+K.accBg+",rgba(245,158,11,0.04))",border:"1px solid "+K.acc+"33",borderRadius:8,padding:16,marginBottom:20 }}>
        <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:10 }}><span style={{ fontSize:16 }}>✦</span><span style={{ fontSize:13,fontWeight:700,color:K.acc,fontFamily:sans }}>AI Solution Advisor</span></div>
        <p style={{ fontSize:12,color:K.dim,fontFamily:sans,margin:"0 0 12px",lineHeight:1.5 }}>Enter context and requirements above, then get AI-powered recommendations.</p>
        <Btn v="primary" onClick={go} disabled={loading}>{loading?"Analyzing...":"Get AI Suggestions"}</Btn>
        {err && <p style={{ color:K.err,fontSize:12,fontFamily:sans,marginTop:8 }}>{err}</p>}
        {sug && (
          <div style={{ marginTop:16 }}>
            <div style={{ background:K.bg,borderRadius:6,padding:12,marginBottom:10 }}><p style={{ fontSize:12,color:K.txt,fontFamily:sans,lineHeight:1.6,margin:0 }}>{sug.summary}</p></div>
            {(sug.suggestedScripts||[]).length>0 && <div style={{ marginBottom:10 }}>
              <label style={{ fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:sans,marginBottom:6,display:"block" }}>Suggested Scripts</label>
              {sug.suggestedScripts.map((s,i)=>(
                <div key={i} style={{ background:K.bg,borderRadius:6,padding:10,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
                  <div>
                    <div style={{ display:"flex",alignItems:"center",gap:6,marginBottom:4 }}><span style={{ padding:"1px 6px",borderRadius:3,fontSize:10,fontWeight:700,background:K.accBg,color:K.acc,fontFamily:mono }}>{s.type}</span><span style={{ fontSize:12,color:K.txt,fontFamily:sans,fontWeight:600 }}>{s.name}</span></div>
                    <p style={{ fontSize:11,color:K.dim,fontFamily:sans,margin:"2px 0 0",lineHeight:1.4 }}>Deploy: {s.deployOn} · Triggers: {s.triggers}</p>
                    <p style={{ fontSize:11,color:K.mut,fontFamily:sans,margin:"2px 0 0",lineHeight:1.4 }}>{s.reasoning}</p>
                  </div>
                  <Btn sm v="success" onClick={()=>onApply("script",s)}>+ Add</Btn>
                </div>
              ))}
            </div>}
            {(sug.suggestedFields||[]).length>0 && <div style={{ marginBottom:10 }}>
              <label style={{ fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:sans,marginBottom:6,display:"block" }}>Suggested Fields</label>
              {sug.suggestedFields.map((f,i)=>(
                <div key={i} style={{ background:K.bg,borderRadius:6,padding:10,marginBottom:6 }}>
                  <div style={{ display:"flex",alignItems:"center",gap:6 }}><span style={{ fontSize:12,fontFamily:mono,color:K.ora }}>{f.fieldId}</span><span style={{ fontSize:12,color:K.txt,fontFamily:sans }}>{f.fieldName}</span><span style={{ fontSize:10,color:K.mut }}>({f.fieldType})</span></div>
                  <p style={{ fontSize:11,color:K.dim,fontFamily:sans,margin:"2px 0 0" }}>On: {f.recordName} · {f.purpose}</p>
                </div>
              ))}
            </div>}
            {(sug.considerations||[]).length>0 && <div style={{ background:K.bg,borderRadius:6,padding:10 }}>
              <label style={{ fontSize:11,fontWeight:600,color:K.warn,fontFamily:sans,marginBottom:4,display:"block" }}>Considerations</label>
              {sug.considerations.map((x,i)=><p key={i} style={{ fontSize:11,color:K.dim,fontFamily:sans,margin:"2px 0",lineHeight:1.4 }}>• {x}</p>)}
            </div>}
          </div>
        )}
      </div>
    );
  }
  
  // ─── Export HTML ───
  function genHTML(project, tasks, estimates) {

        const te=p.filter(e=>e.task!=="Testing"&&e.task!=="Training"&&e.task!=="Requirement Gathering/Scoping");
        const me=p.filter(e=>e.task==="Testing"||e.task==="Training"||e.task==="Requirement Gathering/Scoping");
        return [...me.filter(e=>e.task==="Requirement Gathering/Scoping"),...te,{task:nt.name,min:"",max:""},...me.filter(e=>e.task!=="Requirement Gathering/Scoping")];
      });
      setATi(tasks.length);
    };
    
    const rmTask = idx => {
      if(tasks.length<=1) return;
      const rm=tasks[idx];
      setTasks(p=>p.filter((_,i)=>i!==idx));
      setEsts(p=>p.filter(e=>e.task!==rm.name));
      if(aTi>=idx&&aTi>0) setATi(aTi-1);
    };
    
    const addScr = type => { const s=mkScript(type); upTask("scripts",[...task.scripts,s]); };
    const applySug = (type,data) => {
      if(type==="script"&&SCRIPT_TYPES[data.type]){ const s=mkScript(data.type); s.name=data.name||s.name; s.deployOn=data.deployOn||""; s.triggers=data.triggers||""; upTask("scripts",[...task.scripts,s]); }
    };
    
    const saveJson = () => {
      const payload = {...sol, savedAt: new Date().toISOString()};
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href=url;
      a.download = (((proj&&proj.title)||"Solution").replace(/[^a-zA-Z0-9 _-]/g,"").replace(/\s+/g,"-"))+".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      setFlash(true); setTimeout(()=>setFlash(false),2000);
    };
    
    const loadJson = file => {
      if(!file) return;
      const r = new FileReader();
      r.onload = e => { try { const d=JSON.parse(e.target.result); if(d.project&&d.tasks){setSol(d);setATi(0);setATab("context");setView("build");setShowPv(false);} else alert("Invalid file."); } catch { alert("Could not parse."); } };
      r.readAsText(file);
    };
    
    const preview = () => { setExpHtml(genHTML(proj,tasks,ests)); setShowPv(true); };
    
    useEffect(() => {
      if(!sol) return;
      setEsts(p => { const n=[...p]; tasks.forEach(t=>{ if(!n.find(e=>e.task===t.name)){const i=n.findIndex(e=>e.task==="Testing"); if(i>=0)n.splice(i,0,{task:t.name,min:"",max:""}); else n.push({task:t.name,min:"",max:""});} }); return n; });
    }, [tasks.length]);
    
    if(!sol) return <Landing onNew={()=>{setSol(mkSolution());setATi(0);setView("build");setATab("context");}} onOpen={d=>{setSol(d);setATi(0);setView("build");setATab("context");}} />;
    
    return (
      <div style={{ display:"flex",height:"100vh",background:K.bg,color:K.txt,fontFamily:sans,overflow:"hidden" }}>
        {/* Sidebar */}
        <div style={{ width:250,background:K.sfc,borderRight:"1px solid "+K.bdr,display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden" }}>
          <div style={{ padding:"14px 14px 8px",display:"flex",alignItems:"center",justifyContent:"space-between" }}>
            <div style={{ display:"flex",alignItems:"center",gap:8 }}>
              <span style={{ fontSize:18,fontWeight:800,color:K.acc,fontFamily:mono }}>NS</span>
              <span style={{ fontSize:13,fontWeight:700,color:K.txt }}>Solution Builder</span>
            </div>
            <Btn sm v="ghost" onClick={()=>setSol(null)} style={{ fontSize:10,color:K.dim }}>← Home</Btn>
          </div>
          <div style={{ padding:"4px 14px 8px" }}>
            <TI label="Project Title" value={proj.title} onChange={v=>setProj({...proj,title:v})} placeholder="Project Title" />
            <TI label="Customer" value={proj.customer} onChange={v=>setProj({...proj,customer:v})} placeholder="Customer Name" />
            <TI label="Version" value={proj.version} onChange={v=>setProj({...proj,version:v})} placeholder="1.0" />
          </div>
          <div style={{ padding:"8px 14px",borderTop:"1px solid "+K.bdr,flex:1,overflow:"hidden",display:"flex",flexDirection:"column" }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
              <span style={{ fontSize:10,fontWeight:700,color:K.mut,textTransform:"uppercase",letterSpacing:"0.08em" }}>Tasks</span>
              <Btn sm onClick={addTask}>+</Btn>
            </div>
            <div style={{ overflowY:"auto",flex:1 }}>
              {tasks.map((t,i)=>(
                <div key={t.id} onClick={()=>{setATi(i);setView("build");}}
                     style={{ display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",borderRadius:6,marginBottom:2,cursor:"pointer",background:aTi===i&&view==="build"?K.accBg:"transparent",border:aTi===i&&view==="build"?"1px solid "+K.acc+"33":"1px solid transparent",transition:"all 0.1s" }}>
                  <input value={t.name} onChange={e=>{const v=e.target.value;setTasks(p=>p.map((tk,j)=>{if(j===i){setEsts(es=>es.map(x=>x.task===tk.name?{...x,task:v}:x));return{...tk,name:v};}return tk;}));}}
                         onClick={e=>e.stopPropagation()} style={{ background:"transparent",border:"none",color:K.txt,fontSize:12,fontFamily:sans,fontWeight:500,outline:"none",width:"100%",padding:0 }} />
                  {tasks.length>1 && <Btn sm v="ghost" onClick={e=>{e.stopPropagation();rmTask(i);}} style={{ padding:"0 4px",color:K.mut,fontSize:10 }}>✕</Btn>}
                </div>
              ))}
            </div>
          </div>
          <div style={{ padding:"10px 14px",borderTop:"1px solid "+K.bdr }}>
            <Btn onClick={()=>setView("estimate")} style={{ width:"100%",justifyContent:"center",marginBottom:5,background:view==="estimate"?K.accBg:K.sfcH,color:view==="estimate"?K.acc:K.txt,fontSize:11 }}>Hours Estimate</Btn>
            <Btn onClick={()=>{setView("export");setShowPv(false);}} style={{ width:"100%",justifyContent:"center",marginBottom:5,background:view==="export"?K.accBg:K.sfcH,color:view==="export"?K.acc:K.txt,fontSize:11 }}>Export Document</Btn>
            <div style={{ display:"flex",gap:5 }}>
              <Btn v="primary" onClick={saveJson} style={{ flex:1,justifyContent:"center",fontSize:11,transition:"all 0.3s",background:flash?K.ok:K.acc }}>{flash?"✓ Saved!":"↓ Save .json"}</Btn>
              <Btn onClick={()=>flRef.current&&flRef.current.click()} style={{ flex:1,justifyContent:"center",fontSize:11 }}>↑ Load .json</Btn>
            </div>
            <input ref={flRef} type="file" accept=".json" style={{ display:"none" }} onChange={e=>{loadJson(e.target.files[0]);e.target.value="";}} />
          </div>
        </div>
        
        {/* Main */}
        <div style={{ flex:1,overflowY:"auto",padding:"24px 32px" }}>
          {view==="build"&&task&&(<>
            <h2 style={{ fontSize:20,fontWeight:700,margin:"0 0 4px",fontFamily:sans }}>{task.name}</h2>
            <p style={{ fontSize:12,color:K.mut,margin:"0 0 16px" }}>Define context, requirements, data structure, and scripts.</p>
            <Tabs tabs={[{key:"context",label:"Context & Reqs"},{key:"solution",label:"Solution"},{key:"data",label:"Data Structure"},{key:"scripts",label:"Scripts"}]} active={aTab} onChange={setATab} />
            
            {aTab==="context"&&(<>
              <AISug context={task.context} requirements={task.requirements} onApply={applySug} />
              <Sec title="Context"><TI value={task.context} onChange={v=>upTask("context",v)} placeholder="Who is the customer? Why is this customization needed?..." multi rows={4} /></Sec>
              <Sec title="Requirements" actions={<Btn sm onClick={()=>upTask("requirements",[...task.requirements,{ref:"REQ-"+String(task.requirements.length+1).padStart(2,"0"),type:"user",details:""}])}>+ Add</Btn>}>
                {task.requirements.map((r,i)=>(
                  <div key={i} style={{ display:"flex",gap:8,marginBottom:8,alignItems:"flex-start" }}>
                    <span style={{ padding:"7px 0",fontSize:11,fontWeight:700,color:K.acc,fontFamily:mono,minWidth:52 }}>{r.ref}</span>
                    <select value={r.type} onChange={e=>upTask("requirements",task.requirements.map((x,j)=>j===i?{...x,type:e.target.value}:x))} style={{ padding:"7px 8px",background:K.code,border:"1px solid "+K.bdr,borderRadius:4,color:K.txt,fontSize:11,fontFamily:sans,width:80 }}>
                      <option value="user">User</option><option value="system">System</option>
                    </select>
                    <textarea value={r.details} onChange={e=>upTask("requirements",task.requirements.map((x,j)=>j===i?{...x,details:e.target.value}:x))} placeholder={r.type==="user"?"As a [persona], I [want to], [so that]...":"The system must..."} rows={2}
                              style={{ flex:1,padding:"7px 10px",background:K.code,border:"1px solid "+K.bdr,borderRadius:6,color:K.txt,fontSize:12,fontFamily:sans,outline:"none",resize:"vertical",lineHeight:1.5 }} />
                    {task.requirements.length>1&&<Btn sm v="ghost" onClick={()=>upTask("requirements",task.requirements.filter((_,j)=>j!==i))} style={{ color:K.err,marginTop:4 }}>✕</Btn>}
                  </div>
                ))}
              </Sec>
              <Sec title="Assumptions / Limitations" actions={<Btn sm onClick={()=>upTask("assumptions",[...task.assumptions,{ref:"ASM-"+String(task.assumptions.length+1).padStart(2,"0"),details:""}])}>+ Add</Btn>}>
                {task.assumptions.map((a,i)=>(
                  <div key={i} style={{ display:"flex",gap:8,marginBottom:8,alignItems:"flex-start" }}>
                    <span style={{ padding:"7px 0",fontSize:11,fontWeight:700,color:K.ora,fontFamily:mono,minWidth:52 }}>{a.ref}</span>
                    <textarea value={a.details} onChange={e=>upTask("assumptions",task.assumptions.map((x,j)=>j===i?{...x,details:e.target.value}:x))} placeholder="Known limitation or assumption..." rows={1}
                              style={{ flex:1,padding:"7px 10px",background:K.code,border:"1px solid "+K.bdr,borderRadius:6,color:K.txt,fontSize:12,fontFamily:sans,outline:"none",resize:"vertical",lineHeight:1.5 }} />
                    {task.assumptions.length>1&&<Btn sm v="ghost" onClick={()=>upTask("assumptions",task.assumptions.filter((_,j)=>j!==i))} style={{ color:K.err,marginTop:4 }}>✕</Btn>}
                  </div>
                ))}
              </Sec>
            </>)}
            
            {aTab==="solution"&&(
              <Sec title="Solution Overview">
                <TI value={task.solutionOverview} onChange={v=>upTask("solutionOverview",v)} placeholder="Explain the solution approach. Should be understandable by non-technical stakeholders." multi rows={6} />
                <TI label="Diagrams / Notes" value={task.diagrams} onChange={v=>upTask("diagrams",v)} placeholder="Reference any supporting diagrams or artifacts..." multi rows={3} />
              </Sec>
            )}
            
            {aTab==="data"&&(
              <Sec title="Data Structure" actions={<Btn sm onClick={()=>upTask("dataStructures",[...task.dataStructures,{id:Date.now(),recordName:"",type:"standard",customRecordId:"",headerFields:[{name:"",id:"_ccc_",fieldType:"",notes:""}],lineFields:[]}])}>+ Add Record</Btn>}>
                {task.dataStructures.map((ds,i)=><DSBuilder key={ds.id} ds={ds} onUpdate={u=>upTask("dataStructures",task.dataStructures.map((d,j)=>j===i?u:d))} onRemove={()=>upTask("dataStructures",task.dataStructures.filter((_,j)=>j!==i))} />)}
              </Sec>
            )}
            
            {aTab==="scripts"&&(<>
              <Sec title="Add Script">
                <div style={{ display:"flex",flexWrap:"wrap",gap:6 }}>
                  {Object.keys(SCRIPT_TYPES).map(type=><Btn key={type} sm onClick={()=>addScr(type)}><span style={{ color:K.acc,fontFamily:mono,fontSize:10,fontWeight:700 }}>{SCRIPT_TYPES[type].prefix}</span> {type}</Btn>)}
                </div>
              </Sec>
              {task.scripts.length===0&&<div style={{ textAlign:"center",padding:"40px 20px",color:K.mut }}><p style={{ fontSize:14,margin:"0 0 6px" }}>No scripts added yet</p><p style={{ fontSize:12 }}>Select a script type above or use the AI Advisor on the Context tab.</p></div>}
              {task.scripts.map((s,i)=><ScriptBuilder key={s.id} script={s} onUpdate={u=>upTask("scripts",task.scripts.map((x,j)=>j===i?u:x))} onRemove={()=>upTask("scripts",task.scripts.filter((_,j)=>j!==i))} />)}
            </>)}
          </>)}
          
          {view==="estimate"&&(<>
            <h2 style={{ fontSize:20,fontWeight:700,margin:"0 0 4px" }}>Hours Estimate</h2>
            <p style={{ fontSize:12,color:K.mut,margin:"0 0 20px" }}>Provide min and max hour estimates for each task.</p>
            <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
              <thead><tr>{["Task","Min Hours","Max Hours",""].map(h=><th key={h} style={{ padding:"10px 12px",textAlign:h==="Task"?"left":"center",fontSize:10,fontWeight:700,color:K.mut,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"2px solid "+K.bdr }}>{h}</th>)}</tr></thead>
              <tbody>
              {ests.map((e,i)=>(
                <tr key={i} style={{ borderBottom:"1px solid "+K.bdr }}>
                  <td style={{ padding:"8px 12px" }}><input value={e.task} onChange={ev=>setEsts(p=>p.map((x,j)=>j===i?{...x,task:ev.target.value}:x))} style={{ background:"transparent",border:"none",color:K.txt,fontSize:13,fontFamily:sans,outline:"none",width:"100%" }} /></td>
                  <td style={{ padding:"8px 12px",textAlign:"center" }}><input type="number" value={e.min} onChange={ev=>setEsts(p=>p.map((x,j)=>j===i?{...x,min:ev.target.value}:x))} placeholder="\u2014" style={{ width:60,textAlign:"center",padding:"5px 8px",background:K.code,border:"1px solid "+K.bdr,borderRadius:4,color:K.txt,fontSize:13,fontFamily:mono,outline:"none" }} /></td>
                  <td style={{ padding:"8px 12px",textAlign:"center" }}><input type="number" value={e.max} onChange={ev=>setEsts(p=>p.map((x,j)=>j===i?{...x,max:ev.target.value}:x))} placeholder="\u2014" style={{ width:60,textAlign:"center",padding:"5px 8px",background:K.code,border:"1px solid "+K.bdr,borderRadius:4,color:K.txt,fontSize:13,fontFamily:mono,outline:"none" }} /></td>
                  <td style={{ padding:"8px 12px",width:30 }}><Btn sm v="ghost" onClick={()=>setEsts(p=>p.filter((_,j)=>j!==i))} style={{ color:K.err,padding:"2px 6px" }}>✕</Btn></td>
                </tr>
              ))}
              <tr style={{ background:K.accBg }}>
                <td style={{ padding:"10px 12px",fontWeight:700 }}>Total</td>
                <td style={{ padding:"10px 12px",textAlign:"center",fontWeight:700,fontFamily:mono,color:K.acc }}>{ests.reduce((s,e)=>s+(parseFloat(e.min)||0),0)||"\u2014"}</td>
                <td style={{ padding:"10px 12px",textAlign:"center",fontWeight:700,fontFamily:mono,color:K.acc }}>{ests.reduce((s,e)=>s+(parseFloat(e.max)||0),0)||"\u2014"}</td>
                <td></td>
              </tr>
              </tbody>
            </table>
            <Btn sm onClick={()=>setEsts(p=>[...p,{task:"",min:"",max:""}])} style={{ marginTop:8 }}>+ Add Row</Btn>
          </>)}
          
          {view==="export"&&(<>
            <h2 style={{ fontSize:20,fontWeight:700,margin:"0 0 4px" }}>Export Document</h2>
            <p style={{ fontSize:12,color:K.mut,margin:"0 0 20px" }}>Preview your solution and print/save as PDF.</p>
            <Sec title="Deployment Notes"><TI value={proj.deployment} onChange={v=>setProj({...proj,deployment:v})} placeholder="All development will be done in sandbox. Client will validate before production release." multi rows={3} /></Sec>
            <div style={{ background:K.sfc,borderRadius:8,border:"1px solid "+K.bdr,padding:20,marginBottom:20 }}>
              <h3 style={{ fontSize:14,fontWeight:700,margin:"0 0 12px",color:K.txt }}>Document Summary</h3>
              <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,fontSize:12 }}>
                <div><span style={{ color:K.mut }}>Project:</span> <span style={{ color:K.txt,fontWeight:600 }}>{proj.title||"Untitled"}</span></div>
                <div><span style={{ color:K.mut }}>Customer:</span> <span style={{ color:K.txt,fontWeight:600 }}>{proj.customer||"\u2014"}</span></div>
                <div><span style={{ color:K.mut }}>Tasks:</span> <span style={{ color:K.txt,fontWeight:600 }}>{tasks.length}</span></div>
                <div><span style={{ color:K.mut }}>Scripts:</span> <span style={{ color:K.txt,fontWeight:600 }}>{tasks.reduce((s,t)=>s+t.scripts.length,0)}</span></div>
                <div><span style={{ color:K.mut }}>Hours:</span> <span style={{ color:K.acc,fontWeight:600,fontFamily:mono }}>{ests.reduce((s,e)=>s+(parseFloat(e.min)||0),0)||"?"} – {ests.reduce((s,e)=>s+(parseFloat(e.max)||0),0)||"?"}</span></div>
              </div>
            </div>
            <div style={{ display:"flex",gap:10,marginBottom:16 }}>
              {!showPv ? <Btn v="primary" onClick={preview} style={{ padding:"12px 24px",fontSize:14 }}>Generate Preview</Btn> : (<>
                <Btn v="primary" onClick={()=>ifr.current&&ifr.current.contentWindow&&ifr.current.contentWindow.print()} style={{ padding:"12px 24px",fontSize:14 }}>🖨 Print / Save as PDF</Btn>
                <Btn onClick={preview} style={{ padding:"12px 24px",fontSize:14 }}>↻ Refresh</Btn>
                <Btn onClick={()=>navigator.clipboard.writeText(genHTML(proj,tasks,ests)).catch(()=>{})} style={{ padding:"12px 24px",fontSize:14 }}>Copy HTML</Btn>
              </>)}
            </div>
            {!showPv&&<p style={{ fontSize:11,color:K.mut }}>Click "Generate Preview" to see your document. Use "Print / Save as PDF" to export.</p>}
            {showPv&&(
              <div style={{ borderRadius:8,overflow:"hidden",border:"1px solid "+K.bdr,background:"#fff" }}>
                <div style={{ background:K.sfc,padding:"8px 12px",borderBottom:"1px solid "+K.bdr,display:"flex",alignItems:"center",gap:8 }}>
                  <div style={{ width:10,height:10,borderRadius:"50%",background:K.err }} />
                  <div style={{ width:10,height:10,borderRadius:"50%",background:K.warn }} />
                  <div style={{ width:10,height:10,borderRadius:"50%",background:K.ok }} />
                  <span style={{ fontSize:11,color:K.mut,marginLeft:8,fontFamily:mono }}>Document Preview</span>
                </div>
                <iframe ref={ifr} srcDoc={expHtml} style={{ width:"100%",height:600,border:"none",background:"#fff" }} title="Preview" />
              </div>
            )}
          </>)}
        </div>
      </div>
    );
  }
  
  
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
</script>
</body>
</html>
