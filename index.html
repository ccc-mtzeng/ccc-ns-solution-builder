<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0F1117}
textarea,input,select,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
"use strict";
const h=React.createElement,F=React.Fragment,{useState,useCallback,useRef,useEffect}=React;

const SCRIPT_TYPES={
"Client Script":{prefix:"CS",entryPoints:[
{name:"pageInit",description:"Fires when the page completes loading or when a form is reset",pseudo:""},
{name:"fieldChanged",description:"Fires after a field value is changed",pseudo:""},
{name:"postSourcing",description:"Fires after all sourcing is complete for a field",pseudo:""},
{name:"lineInit",description:"Fires when inserting a new line or selecting an existing line",pseudo:""},
{name:"validateField",description:"Fires before a field value change is committed",pseudo:""},
{name:"validateLine",description:"Fires before a line is added to a sublist",pseudo:""},
{name:"validateInsert",description:"Fires before a new line is inserted in a sublist",pseudo:""},
{name:"validateDelete",description:"Fires before a line is removed from a sublist",pseudo:""},
{name:"saveRecord",description:"Fires when the record is saved",pseudo:""},
{name:"sublistChanged",description:"Fires after a sublist commit",pseudo:""}
]},
"User Event":{prefix:"UE",entryPoints:[
{name:"beforeLoad",description:"Fires before the record form is loaded",pseudo:""},
{name:"beforeSubmit",description:"Fires before the record is submitted to the database",pseudo:""},
{name:"afterSubmit",description:"Fires after the record is submitted to the database",pseudo:""}
]},
"Map/Reduce":{prefix:"MR",entryPoints:[
{name:"getInputData",description:"Defines the input data for processing",pseudo:""},
{name:"map",description:"Processes each key-value pair from getInputData",pseudo:""},
{name:"reduce",description:"Processes each group of values by key",pseudo:""},
{name:"summarize",description:"Summarizes the results of map and reduce stages",pseudo:""}
]},
"Scheduled Script":{prefix:"SS",entryPoints:[{name:"execute",description:"Main execution point, runs on schedule or on demand",pseudo:""}]},
"Suitelet":{prefix:"SL",entryPoints:[{name:"onRequest",description:"Handles GET and POST requests to the Suitelet URL",pseudo:""}]},
"Restlet":{prefix:"RL",entryPoints:[
{name:"get",description:"Handles HTTP GET requests",pseudo:""},
{name:"post",description:"Handles HTTP POST requests",pseudo:""},
{name:"put",description:"Handles HTTP PUT requests",pseudo:""},
{name:"delete",description:"Handles HTTP DELETE requests",pseudo:""}
]},
"Workflow Action Script":{prefix:"WA",entryPoints:[{name:"onAction",description:"Fires when the workflow action is triggered",pseudo:""}]},
"Mass Update Script":{prefix:"MU",entryPoints:[{name:"each",description:"Processes each record matching the mass update criteria",pseudo:""}]}
};

const FIELD_TYPES=["Free-Form Text","Text Area","Long Text","Rich Text","Email","Phone","Integer","Decimal","Currency","Percent","Checkbox","Date","Date/Time","Time of Day","List/Record","Multiple Select","Inline HTML"];
const EST_DEFAULT=[{task:"Requirement Gathering/Scoping",min:"",max:""},{task:"Testing",min:"",max:""},{task:"Training",min:"",max:""}];

function mkTask(i){return{id:Date.now()+i,name:"Task "+(i+1),context:"",requirements:[{ref:"REQ-01",type:"user",details:""}],assumptions:[{ref:"ASM-01",details:""}],solutionOverview:"",diagrams:"",dataStructures:[{id:Date.now(),recordName:"",type:"standard",customRecordId:"",headerFields:[{name:"",id:"_ccc_",fieldType:"",notes:""}],lineFields:[]}],scripts:[]}}
function mkScript(type){var t=SCRIPT_TYPES[type];return{id:Date.now()+Math.random(),type:type,name:"CCC | [Description] "+t.prefix,deployOn:"",triggers:"",entryPoints:t.entryPoints.map(function(ep){return Object.assign({},ep)})}}
function mkSolution(){return{id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),savedAt:new Date().toISOString(),project:{title:"",customer:"",version:"1.0",date:new Date().toLocaleDateString(),deployment:""},tasks:[mkTask(0)],estimates:EST_DEFAULT.map(function(e){return Object.assign({},e)})}}

var K={bg:"#0F1117",sfc:"#181B25",sfcH:"#1E2230",bdr:"#2A2E3B",bdrF:"#5B8DEF",acc:"#5B8DEF",accBg:"rgba(91,141,239,0.08)",txt:"#E4E7EE",dim:"#8B90A0",mut:"#5A5F72",ok:"#4ADE80",warn:"#FBBF24",err:"#EF4444",errBg:"rgba(239,68,68,0.08)",code:"#1A1D27",ora:"#F59E0B"};
var mono="'JetBrains Mono','SF Mono','Cascadia Code','Fira Code',monospace";
var sans="'DM Sans','Inter',-apple-system,sans-serif";

// --- Primitives ---
function TI(p){
  var El=p.multi?"textarea":"input";
  var props={value:p.value,onChange:function(e){p.onChange(e.target.value)},placeholder:p.placeholder,style:{width:"100%",padding:p.multi?"10px 12px":"8px 12px",background:K.code,border:"1px solid "+K.bdr,borderRadius:6,color:K.txt,fontSize:13,fontFamily:p.isMono?mono:sans,outline:"none",resize:p.multi?"vertical":"none",lineHeight:1.6,transition:"border-color 0.15s"},onFocus:function(e){e.target.style.borderColor=K.bdrF},onBlur:function(e){e.target.style.borderColor=K.bdr}};
  if(p.multi)props.rows=p.rows||3;
  return h("div",{style:{marginBottom:14}},
    p.label?h("label",{style:{display:"block",fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5,fontFamily:sans}},p.label):null,
    h(El,props)
  );
}

function Sel(p){
  return h("div",{style:{marginBottom:14}},
    p.label?h("label",{style:{display:"block",fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5,fontFamily:sans}},p.label):null,
    h("select",{value:p.value,onChange:function(e){p.onChange(e.target.value)},style:{width:"100%",padding:"8px 12px",background:K.code,border:"1px solid "+K.bdr,borderRadius:6,color:p.value?K.txt:K.mut,fontSize:13,fontFamily:sans,outline:"none",cursor:"pointer"}},
      p.placeholder?h("option",{value:""},p.placeholder):null,
      p.options.map(function(o){return h("option",{key:o,value:o},o)})
    )
  );
}

function Btn(p){
  var base={padding:p.sm?"5px 10px":"8px 16px",borderRadius:6,fontSize:p.sm?11:12,fontWeight:600,fontFamily:sans,cursor:p.disabled?"not-allowed":"pointer",border:"none",transition:"all 0.15s",display:"inline-flex",alignItems:"center",gap:6,opacity:p.disabled?0.5:1,letterSpacing:"0.02em"};
  var vs={default:{background:K.sfcH,color:K.txt},primary:{background:K.acc,color:"#fff"},danger:{background:K.errBg,color:K.err,border:"1px solid "+K.err+"33"},ghost:{background:"transparent",color:K.dim},success:{background:"rgba(74,222,128,0.1)",color:K.ok,border:"1px solid "+K.ok+"33"}};
  var v=p.v||"default";
  return h("button",{onClick:p.disabled?undefined:p.onClick,style:Object.assign({},base,vs[v],p.style)},p.children);
}

function Sec(p){
  return h("div",{style:{marginBottom:24}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      h("h3",{style:{fontSize:13,fontWeight:700,color:K.acc,textTransform:"uppercase",letterSpacing:"0.08em",fontFamily:sans,margin:0}},p.title),
      p.actions
    ),
    p.children
  );
}

function Tabs(p){
  return h("div",{style:{display:"flex",gap:2,marginBottom:20,borderBottom:"1px solid "+K.bdr}},
    p.tabs.map(function(t){return h("button",{key:t.key,onClick:function(){p.onChange(t.key)},style:{padding:"8px 16px",fontSize:12,fontWeight:p.active===t.key?700:500,fontFamily:sans,color:p.active===t.key?K.acc:K.dim,background:"transparent",border:"none",borderBottom:p.active===t.key?"2px solid "+K.acc:"2px solid transparent",cursor:"pointer",transition:"all 0.15s",marginBottom:-1}},t.label)})
  );
}

// --- Script Builder ---
function ScriptBuilder(p){
  var s=p.script;
  var _e=useState({}),exp=_e[0],setExp=_e[1];
  function toggle(n){setExp(function(prev){var o=Object.assign({},prev);o[n]=!o[n];return o})}
  function upEp(i,f,v){var eps=s.entryPoints.map(function(e,j){return j===i?Object.assign({},e,{[f]:v}):e});p.onUpdate(Object.assign({},s,{entryPoints:eps}))}
  return h("div",{style:{background:K.code,border:"1px solid "+K.bdr,borderRadius:8,padding:16,marginBottom:12}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}},
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("span",{style:{padding:"2px 8px",borderRadius:4,fontSize:10,fontWeight:700,background:K.accBg,color:K.acc,fontFamily:mono,letterSpacing:"0.05em"}},(SCRIPT_TYPES[s.type]||{}).prefix||"??"),
        h("span",{style:{fontSize:13,fontWeight:600,color:K.txt,fontFamily:sans}},s.type)
      ),
      h(Btn,{sm:true,v:"danger",onClick:p.onRemove},"\u2715")
    ),
    h(TI,{label:"Script Name",value:s.name,onChange:function(v){p.onUpdate(Object.assign({},s,{name:v}))},placeholder:"CCC | Description UE",isMono:true}),
    h(TI,{label:"Deployed On",value:s.deployOn,onChange:function(v){p.onUpdate(Object.assign({},s,{deployOn:v}))},placeholder:"e.g., Sales Order, Invoice"}),
    h(TI,{label:"Trigger Conditions",value:s.triggers,onChange:function(v){p.onUpdate(Object.assign({},s,{triggers:v}))},placeholder:"e.g., BeforeSubmit Create/Edit"}),
    h("div",{style:{marginTop:12}},
      h("label",{style:{display:"block",fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8,fontFamily:sans}},"Entry Points"),
      s.entryPoints.map(function(ep,i){
        return h("div",{key:ep.name,style:{marginBottom:4}},
          h("button",{onClick:function(){toggle(ep.name)},style:{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:exp[ep.name]?K.sfcH:"transparent",border:"1px solid "+(exp[ep.name]?K.bdr:"transparent"),borderRadius:6,cursor:"pointer",color:ep.pseudo?K.ok:K.dim,fontFamily:mono,fontSize:12,transition:"all 0.15s"}},
            h("span",null,
              h("span",{style:{color:K.ora,marginRight:4}},"\u0192")," ",ep.name,
              ep.pseudo?h("span",{style:{marginLeft:8,fontSize:10,color:K.ok}},"\u25CF has pseudo-code"):null
            ),
            h("span",{style:{fontSize:10,transform:exp[ep.name]?"rotate(180deg)":"rotate(0)",transition:"transform 0.15s"}},"\u25BC")
          ),
          exp[ep.name]?h("div",{style:{padding:"8px 12px 12px",borderLeft:"2px solid "+K.bdr,marginLeft:16,marginTop:4}},
            h("p",{style:{fontSize:11,color:K.mut,fontFamily:sans,margin:"0 0 8px",lineHeight:1.5}},ep.description),
            h("textarea",{value:ep.pseudo,onChange:function(e){upEp(i,"pseudo",e.target.value)},placeholder:"// Describe the logic...\n// e.g., Loop over line items",rows:6,style:{width:"100%",padding:"10px 12px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:6,color:K.txt,fontSize:12,fontFamily:mono,outline:"none",resize:"vertical",lineHeight:1.7}})
          ):null
        )
      })
    )
  );
}

// --- Data Structure Builder ---
function DSBuilder(p){
  var ds=p.ds;
  function addF(sec){var d=Object.assign({},ds);d[sec]=d[sec].concat([{name:"",id:"_ccc_",fieldType:"",notes:""}]);p.onUpdate(d)}
  function upF(sec,i,f,v){var d=Object.assign({},ds);d[sec]=d[sec].map(function(x,j){return j===i?Object.assign({},x,{[f]:v}):x});p.onUpdate(d)}
  function rmF(sec,i){var d=Object.assign({},ds);d[sec]=d[sec].filter(function(_,j){return j!==i});p.onUpdate(d)}

  function FT(fp){
    return h("div",{style:{overflowX:"auto"}},
      h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:sans}},
        h("thead",null,h("tr",null,["Field Name","ID","Type","Notes",""].map(function(hd){return h("th",{key:hd,style:{padding:"6px 8px",textAlign:"left",fontSize:10,fontWeight:700,color:K.mut,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid "+K.bdr}},hd)}))),
        h("tbody",null,fp.fields.map(function(f,i){
          return h("tr",{key:i},
            h("td",{style:{padding:"4px"}},h("input",{value:f.name,onChange:function(e){upF(fp.section,i,"name",e.target.value)},placeholder:"Field name",style:{width:"100%",padding:"5px 8px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:4,color:K.txt,fontSize:12,fontFamily:sans,outline:"none"}})),
            h("td",{style:{padding:"4px"}},h("input",{value:f.id,onChange:function(e){upF(fp.section,i,"id",e.target.value)},placeholder:"_ccc_",style:{width:"100%",padding:"5px 8px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:4,color:K.txt,fontSize:12,fontFamily:mono,outline:"none"}})),
            h("td",{style:{padding:"4px"}},h("select",{value:f.fieldType,onChange:function(e){upF(fp.section,i,"fieldType",e.target.value)},style:{width:"100%",padding:"5px 8px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:4,color:f.fieldType?K.txt:K.mut,fontSize:12,fontFamily:sans,outline:"none"}},h("option",{value:""},"Select type"),FIELD_TYPES.map(function(t){return h("option",{key:t,value:t},t)}))),
            h("td",{style:{padding:"4px"}},h("input",{value:f.notes,onChange:function(e){upF(fp.section,i,"notes",e.target.value)},placeholder:"Notes",style:{width:"100%",padding:"5px 8px",background:K.bg,border:"1px solid "+K.bdr,borderRadius:4,color:K.txt,fontSize:12,fontFamily:sans,outline:"none"}})),
            h("td",{style:{padding:"4px",width:30}},h(Btn,{sm:true,v:"ghost",onClick:function(){rmF(fp.section,i)},style:{color:K.err,padding:"2px 6px"}},"\u2715"))
          )
        }))
      ),
      h(Btn,{sm:true,onClick:function(){addF(fp.section)},style:{marginTop:6}},"+Add Field")
    );
  }

  return h("div",{style:{background:K.code,border:"1px solid "+K.bdr,borderRadius:8,padding:16,marginBottom:12}},
    h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:12}},
      h("div",{style:{flex:1}},h(Sel,{label:"Record Type",value:ds.type,onChange:function(v){p.onUpdate(Object.assign({},ds,{type:v}))},options:["standard","custom"]})),
      h(Btn,{sm:true,v:"danger",onClick:p.onRemove,style:{marginTop:20}},"\u2715")
    ),
    h(TI,{label:ds.type==="custom"?"Custom Record Name":"Record Name",value:ds.recordName,onChange:function(v){p.onUpdate(Object.assign({},ds,{recordName:v}))},placeholder:"e.g., Sales Order"}),
    ds.type==="custom"?h(TI,{label:"Custom Record ID",value:ds.customRecordId,onChange:function(v){p.onUpdate(Object.assign({},ds,{customRecordId:v}))},placeholder:"_ccc_record_id",isMono:true}):null,
    h("div",{style:{marginTop:8}},
      h("label",{style:{fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:sans}},"Header Fields"),
      h(FT,{fields:ds.headerFields,section:"headerFields"})
    ),
    h("div",{style:{marginTop:12}},
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("label",{style:{fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:sans}},"Line Fields"),
        ds.lineFields.length===0?h(Btn,{sm:true,onClick:function(){addF("lineFields")}},"+Add Line Fields"):null
      ),
      ds.lineFields.length>0?h(FT,{fields:ds.lineFields,section:"lineFields"}):null
    )
  );
}

// --- AI Suggestions ---
function AISug(p){
  var _l=useState(false),loading=_l[0],setLoading=_l[1];
  var _s=useState(null),sug=_s[0],setSug=_s[1];
  var _e=useState(null),err=_e[0],setErr=_e[1];
  function go(){
    if(!p.context&&p.requirements.every(function(r){return!r.details})){setErr("Enter context or requirements first.");return}
    setLoading(true);setErr(null);setSug(null);
    var rTxt=p.requirements.filter(function(r){return r.details}).map(function(r){return r.ref+": "+r.details}).join("\n");
    var prompt="You are a NetSuite technical consultant. Based on the following context and requirements, suggest the most appropriate NetSuite customization approach.\n\nContext: "+(p.context||"Not provided")+"\n\nRequirements:\n"+(rTxt||"Not provided")+'\n\nRespond ONLY with valid JSON (no markdown, no backticks). Use this exact structure:\n{"summary":"2-3 sentence overview","suggestedScripts":[{"type":"One of: Client Script, User Event, Map/Reduce, Scheduled Script, Suitelet, Restlet, Workflow Action Script, Mass Update Script","name":"CCC naming convention","deployOn":"record","triggers":"when","reasoning":"why"}],"suggestedFields":[{"recordName":"record","fieldName":"name","fieldId":"_ccc_id","fieldType":"type","purpose":"why"}],"assumptions":["assumptions"],"considerations":["things to consider"]}';
    fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})}).then(function(r){return r.json()}).then(function(data){
      var txt=(data.content||[]).map(function(x){return x.text||""}).join("");
      setSug(JSON.parse(txt.replace(/```json|```/g,"").trim()));
      setLoading(false);
    }).catch(function(){setErr("Failed. Please try again.");setLoading(false)});
  }
  return h("div",{style:{background:"linear-gradient(135deg,"+K.accBg+",rgba(245,158,11,0.04))",border:"1px solid "+K.acc+"33",borderRadius:8,padding:16,marginBottom:20}},
    h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:10}},
      h("span",{style:{fontSize:16}},"\u2726"),
      h("span",{style:{fontSize:13,fontWeight:700,color:K.acc,fontFamily:sans}},"AI Solution Advisor")
    ),
    h("p",{style:{fontSize:12,color:K.dim,fontFamily:sans,margin:"0 0 12px",lineHeight:1.5}},"Enter context and requirements above, then get AI-powered recommendations."),
    h(Btn,{v:"primary",onClick:go,disabled:loading},loading?"Analyzing...":"Get AI Suggestions"),
    err?h("p",{style:{color:K.err,fontSize:12,fontFamily:sans,marginTop:8}},err):null,
    sug?h("div",{style:{marginTop:16}},
      h("div",{style:{background:K.bg,borderRadius:6,padding:12,marginBottom:10}},h("p",{style:{fontSize:12,color:K.txt,fontFamily:sans,lineHeight:1.6,margin:0}},sug.summary)),
      sug.suggestedScripts&&sug.suggestedScripts.length>0?h("div",{style:{marginBottom:10}},
        h("label",{style:{fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:sans,marginBottom:6,display:"block"}},"Suggested Scripts"),
        sug.suggestedScripts.map(function(s,i){
          return h("div",{key:i,style:{background:K.bg,borderRadius:6,padding:10,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
            h("div",null,
              h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},
                h("span",{style:{padding:"1px 6px",borderRadius:3,fontSize:10,fontWeight:700,background:K.accBg,color:K.acc,fontFamily:mono}},s.type),
                h("span",{style:{fontSize:12,color:K.txt,fontFamily:sans,fontWeight:600}},s.name)
              ),
              h("p",{style:{fontSize:11,color:K.dim,fontFamily:sans,margin:"2px 0 0",lineHeight:1.4}},"Deploy: "+s.deployOn+" \u00b7 Triggers: "+s.triggers),
              h("p",{style:{fontSize:11,color:K.mut,fontFamily:sans,margin:"2px 0 0",lineHeight:1.4}},s.reasoning)
            ),
            h(Btn,{sm:true,v:"success",onClick:function(){p.onApply("script",s)}},"+Add")
          )
        })
      ):null,
      sug.suggestedFields&&sug.suggestedFields.length>0?h("div",{style:{marginBottom:10}},
        h("label",{style:{fontSize:11,fontWeight:600,color:K.dim,textTransform:"uppercase",letterSpacing:"0.06em",fontFamily:sans,marginBottom:6,display:"block"}},"Suggested Fields"),
        sug.suggestedFields.map(function(f,i){
          return h("div",{key:i,style:{background:K.bg,borderRadius:6,padding:10,marginBottom:6}},
            h("div",{style:{display:"flex",alignItems:"center",gap:6}},
              h("span",{style:{fontSize:12,fontFamily:mono,color:K.ora}},f.fieldId),
              h("span",{style:{fontSize:12,color:K.txt,fontFamily:sans}},f.fieldName),
              h("span",{style:{fontSize:10,color:K.mut}},"("+f.fieldType+")")
            ),
            h("p",{style:{fontSize:11,color:K.dim,fontFamily:sans,margin:"2px 0 0"}},"On: "+f.recordName+" \u00b7 "+f.purpose)
          )
        })
      ):null,
      sug.considerations&&sug.considerations.length>0?h("div",{style:{background:K.bg,borderRadius:6,padding:10}},
        h("label",{style:{fontSize:11,fontWeight:600,color:K.warn,fontFamily:sans,marginBottom:4,display:"block"}},"Considerations"),
        sug.considerations.map(function(x,i){return h("p",{key:i,style:{fontSize:11,color:K.dim,fontFamily:sans,margin:"2px 0",lineHeight:1.4}},"\u2022 "+x)})
      ):null
    ):null
  );
}

// --- Export HTML Generator ---
function genHTML(project,tasks,estimates){
  var th='<tr><th style="padding:4px 8px;border:1px solid #ddd;background:#f5f5f5;text-align:left;">Field</th><th style="padding:4px 8px;border:1px solid #ddd;background:#f5f5f5;text-align:left;">ID</th><th style="padding:4px 8px;border:1px solid #ddd;background:#f5f5f5;text-align:left;">Type</th><th style="padding:4px 8px;border:1px solid #ddd;background:#f5f5f5;text-align:left;">Notes</th></tr>';
  var taskSec=tasks.map(function(t,ti){
    var rr=t.requirements.map(function(r){return'<tr><td style="padding:6px 10px;border:1px solid #ddd;font-weight:600;width:70px;">'+r.ref+'</td><td style="padding:6px 10px;border:1px solid #ddd;">'+(r.details||"")+"</td></tr>"}).join("");
